<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Example</title>
    <style>
        /* Define CSS Variables for theming */
        :root {
            --background-color: #ffffff;
            --text-color: #333333;
            --button-bg: #007bff;
            --button-text: #ffffff;
        }

        /* Dark mode overrides using a class */
        .dark-mode {
            --background-color: #1a1a1a;
            --text-color: #e0e0e0;
            --button-bg: #333333;
            --button-text: #ffffff;
        }

        /* Apply variables to elements */
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: var(--button-bg);
            color: var(--button-text);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Media query for system preference (optional but good practice) */
        @media (prefers-color-scheme: dark) {
            :root {
                --background-color: #1a1a1a;
                --text-color: #e0e0e0;
                --button-bg: #333333;
                --button-text: #ffffff;
            }
        }
    </style>
</head>
<body>

    <h1>Karanlık Mod Denemesi</h1>
    <p>Bu örnek, tek bir CSS dosyası kullanarak karanlık modu nasıl uygulayabileceğinizi gösterir.</p>
    <button id="theme-toggle">Karanlık Modu Aç/Kapat</button>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');

            // Save theme preference
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });
    </script>

</body>
</html>
